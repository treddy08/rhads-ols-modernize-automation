---
- name: Remove MTA Operator (cluster-wide)
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: "{{ ocp4_workload_cluster_mta_operator_name }}"
    install_operator_namespace: "{{ ocp4_workload_cluster_mta_namespace }}"
    install_operator_channel: "{{ ocp4_workload_cluster_mta_channel }}"
    install_operator_automatic_install_plan_approval: "{{ ocp4_workload_cluster_mta_automatic_install_plan_approval | default('true') }}"
    install_operator_starting_csv: "{{ ocp4_workload_cluster_mta_starting_csv }}"
    install_operator_catalogsource_setup: "{{ ocp4_workload_cluster_mta_catalogsource_setup }}"
    install_operator_catalogsource_image: "{{ ocp4_workload_cluster_mta_catalogsource_image }}"
    install_operator_catalogsource_image_tag: "{{ ocp4_workload_cluster_mta_catalogsource_image_tag }}"

- name: Remove workload tasks complete
  ansible.builtin.debug:
    msg: "Remove Workload tasks completed successfully."
